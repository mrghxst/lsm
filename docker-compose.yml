services:
  lsm:
    # Which image to pull. Defaults to the upstream ghcr build; override it in
    # a local .env (LSM_IMAGE=your-registry/lsm:latest) to run your own fork's
    # image — e.g. a Docker Hub build: LSM_IMAGE=mrghxst/lsm:latest
    image: ${LSM_IMAGE:-ghcr.io/michaelmrusch/lsm:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      # Published on the host so your Cloudflare Tunnel (cloudflared) can reach
      # it. If cloudflared runs on this same host, bind to localhost only —
      # '127.0.0.1:3000:3000' — so the tunnel is the only way in.
      - '3000:3000'
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      # Give one account the admin panel (/admin) — set to your username:
      # - ADMIN_USERNAME=Michael
