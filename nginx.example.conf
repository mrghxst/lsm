# Example nginx server block for Learning Space Manager.
# Adjust server_name, then place in /etc/nginx/sites-available/ and symlink
# into sites-enabled (or drop into conf.d/). Run certbot for HTTPS afterwards:
#   sudo certbot --nginx -d lsm.example.com

server {
    listen 80;
    server_name lsm.example.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for the live-updates stream (Server-Sent Events):
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_set_header Connection '';
    }
}
