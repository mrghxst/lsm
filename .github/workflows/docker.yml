# Build the production image and push it to Docker Hub (mrghxst/lsm) on
# every push to main. Needs two repository secrets (Settings → Secrets and
# variables → Actions): DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (an access
# token from hub.docker.com → Account Settings → Personal access tokens).
name: docker image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # latest for `docker compose pull`, the commit SHA for rollbacks
          tags: |
            mrghxst/lsm:latest
            mrghxst/lsm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
