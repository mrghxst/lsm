# Build the production image and push it on every push to main.
#
# Works unchanged in any fork — the target registry is chosen automatically:
#   * If the DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo secrets are set, the
#     image goes to Docker Hub as <DOCKERHUB_USERNAME>/lsm.
#   * Otherwise it goes to GitHub's registry as ghcr.io/<owner>/lsm using the
#     workflow's built-in GITHUB_TOKEN (no secrets to configure). Make the
#     package public once so the server can pull it without logging in.
# Because the file is identical in every fork, it never shows up as a diff in
# a pull request — each repo just deploys to its own registry.
name: docker image

on:
  push:
    branches: [main]

# Two pushes in quick succession must not race: the slower (older) build
# would finish last and overwrite :latest with outdated code — this exact
# thing shipped a stale image once. Newest push wins, older in-flight
# builds are cancelled.
concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed for the ghcr.io fallback
    steps:
      - uses: actions/checkout@v4

      - name: Pick the target registry
        id: target
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "registry=docker.io" >> "$GITHUB_OUTPUT"
            echo "image=docker.io/$DOCKERHUB_USERNAME/lsm" >> "$GITHUB_OUTPUT"
          else
            echo "registry=ghcr.io" >> "$GITHUB_OUTPUT"
            echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.target.outputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME || github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # latest for `docker compose pull`, the commit SHA for rollbacks
          tags: |
            ${{ steps.target.outputs.image }}:latest
            ${{ steps.target.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
