<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f6f3" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LSM" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400..700&family=Space+Grotesk:wght@500..700&display=swap"
      rel="stylesheet"
    />
    <!-- Pick the theme before first paint, otherwise a dark-mode user gets a
         white flash on every load. Mirrors resolveTheme() in src/theme.ts. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('lsm-theme');
          var dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) {
            document.documentElement.classList.add('dark');
            document.querySelector('meta[name=theme-color]').setAttribute('content', '#0b0e13');
          }
        } catch (e) {}
      })();
    </script>
    <!--APP_META-->
    <title>Learning Space Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
